<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's Watching? - Trioflix Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gold: #ffcc00; /* Aapka favorite Golden/Amber color */
            --bg-black: #000000;
            --text-gray: #808080;
        }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .profile-main {
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 500;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .profile-list {
            display: flex;
            justify-content: center;
            gap: 45px;
            list-style: none;
            padding: 0;
        }

        .profile-item {
            text-decoration: none;
            color: var(--text-gray);
            transition: color 0.3s;
        }

        .avatar-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin-bottom: 15px;
            border-radius: 4px;
            overflow: hidden;
            border: 4px solid transparent;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s;
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Hover Effects */
        .profile-item:hover .avatar-wrapper {
            transform: scale(1.1);
            border-color: var(--primary-gold);
        }

        .profile-item:hover {
            color: #fff;
        }

        .profile-name {
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* Manage Profiles Button */
        .manage-btn {
            margin-top: 60px;
            background: transparent;
            color: var(--text-gray);
            border: 1.5px solid var(--text-gray);
            padding: 10px 25px;
            font-size: 1.1rem;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .manage-btn:hover {
            border-color: #fff;
            color: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="profile-main">
        <h1>Who's watching?</h1>
        
        <div class="profile-list">
            <a href="{% url 'users_app:media' %}" class="profile-item">
                <div class="avatar-wrapper">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Mohit">
                </div>
                <div class="profile-name">Mohit</div>
            </a>

            <a href="{% url 'users_app:media' %}" class="profile-item">
                <div class="avatar-wrapper">
                    <img src="https://wallpapers.com/images/hd/netflix-profile-pictures-1000-x-1000-qo9h82134t9nv0j0.jpg" alt="Kids">
                </div>
                <div class="profile-name">Kids</div>
            </a>

            <a href="{% url 'users_app:media' %}" class="profile-item">
                <div class="avatar-wrapper">
                    <img src="https://mir-s3-cdn-cf.behance.net/project_modules/disp/84c20033850498.56ba69ac290ea.png" alt="Guest">
                </div>
                <div class="profile-name">Guest</div>
            </a>
        </div>

        <button class="manage-btn">MANAGE PROFILES</button>
    </div>

</body>
</html>

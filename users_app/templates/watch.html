{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watching: {{ movie.title }}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #000; /* Pura background black Netflix ki tarah */
            color: white; 
            height: 100vh; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            overflow: hidden; /* Scrollbar hide karne ke liye */
            font-family: 'Outfit', sans-serif;
        }

        .video-wrapper { 
            width: 95%; 
            max-width: 1100px; 
            position: relative; 
        }

        /* Back Button - Premium Glassmorphism Effect */
        .back-btn { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            text-decoration: none; 
            color: #fff; 
            background: rgba(255, 255, 255, 0.15); /* Translucent background */
            padding: 10px 20px; 
            border-radius: 8px; 
            z-index: 100; 
            backdrop-filter: blur(5px); /* Background dhundla karne ke liye */
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        /* Back Button Hover Effect */
        .back-btn:hover { 
            background: #ffcc00; /* Mohit ka favorite Golden color */
            color: #000; 
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }

        /* Movie title ki styling jo video ke upar dikhega */
        .movie-title-box {
            text-align: left;
            width: 100%;
            margin-bottom: 15px;
        }

        /* Video controls aur shortcuts ki guide */
        .controls-hint {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            color: #666;
            font-size: 0.8rem;
        }

        /* Video element ki shadows */
        video, .ratio {
            border-radius: 12px; 
            border: 1px solid #333;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <a href="{% url 'users_app:media' %}" class="back-btn">← Back to Browse</a>

    <div class="video-wrapper">
        <div class="movie-title-box">
            <h2 class="fw-bold m-0">{{ movie.title }}</h2>
            <p class="text-warning small mb-0">Playing in Premium HD</p>
        </div>
        
        {% if "embed" in final_url %}
            <div class="ratio ratio-16x9">
                <iframe 
                    src="{{ final_url }}&autoplay=1" 
                    title="YouTube video player" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen
                    style="border-radius: 12px; border: none;">
                </iframe>
            </div>
            <div class="controls-hint text-info mt-2">YouTube Keys: 'J' (Rewind), 'K' (Pause), 'L' (Forward)</div>
        
        {% else %}
            <div class="position-relative">
                <video id="videoPlayer" controls autoplay controlsList="nodownload" style="width: 100%; max-height: 80vh; background: #000;">
                <source src="{{ final_url }}" type="video/mp4">
                <source src="{{ movie.video_file.url }}" type="video/mp4"> Aapka browser video support nahi karta.
               </video>
            </div>
            <div class="controls-hint mt-2">Shortcuts: Space (Play/Pause) | Arrow Keys (Skip 10s) | 'F' (Fullscreen)</div>
        {% endif %}
    </div>

    <script>
        // Check karein ki screen par video element hai ya nahi (sirf native video ke liye)
        const video = document.getElementById('videoPlayer');

        if (video) {
            window.addEventListener('keydown', function(e) {
                // Space bar se Play ya Pause karein
                if (e.code === 'Space') {
                    e.preventDefault(); // Page ko niche scroll hone se rokega
                    if (video.paused) video.play();
                    else video.pause();
                }

                // Right Arrow: 10 second aage bhagane ke liye
                if (e.code === 'ArrowRight') {
                    e.preventDefault();
                    //currentTime ko 10s badhao, lekin video ki total duration se zyada nahi
                    video.currentTime = Math.min(video.duration, video.currentTime + 10);
                }

                // Left Arrow: 10 second piche karne ke liye
                if (e.code === 'ArrowLeft') {
                    e.preventDefault();
                    //currentTime ko 10s ghatao, lekin 0 se niche nahi
                    video.currentTime = Math.max(0, video.currentTime - 10);
                }

                // 'F' key: Fullscreen mode ON/OFF karne ke liye
                if (e.key.toLowerCase() === 'f') {
                    if (!document.fullscreenElement) {
                        video.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                }
            });
        }
    </script>

</body>
</html>
